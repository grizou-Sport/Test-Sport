<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momentum — YOU</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="you-body">
  <header class="topbar you-topbar">
    <a class="brand" href="index.html">
      <span class="mark">△</span><strong>Momentum</strong><em>v0.08</em>
    </a>

    <nav>
      <a href="index.html">HOME</a>
      <a href="you.html" class="active-nav">YOU</a>
      <a href="#" class="disabled-link">TOGETHER</a>
    </nav>
  </header>

  <main class="you-shell">
    <aside class="you-passport-card">
      <div class="you-avatar">...</div>
      <h1 id="passportName">...</h1>
      <p class="you-location" id="passportLocation">...</p>
      <p class="you-quote" id="passportQuote">...</p>

      <div class="you-mini-stats">
        <div><span>Âge</span><strong id="passportAge>—</strong></div>
        <div><span>Taille</span><strong id="passportHeight">—<</strong></div>
        <div><span>Poids</span><strong id="passportWeight">—</strong></div>
      </div>

<button class="you-edit-btn" type="button" data-you-section="about">Modifier mes infos</button>
<button class="you-edit-btn" id="logoutBtn" type="button">Se déconnecter</button>
    </aside>

    <section class="you-main-card">
      <div class="you-menu">
        <button class="you-menu-item active" data-you-section="mission">
          <span>🎯</span><strong>Mission actuelle</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="sports">
          <span>🏃</span><strong>Sports</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="equipment">
          <span>🎒</span><strong>Équipement</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="wellbeing">
          <span>❤️</span><strong>Bien-être</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="data">
          <span>📥</span><strong>Données</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="collections">
          <span>🖼️</span><strong>Collections</strong><em>›</em>
        </button>
        <button class="you-menu-item" data-you-section="about">
          <span>👤</span><strong>À propos de toi</strong><em>›</em>
        </button>
      </div>

      <article class="you-detail" id="youDetail">
        <p class="section-kicker">Mission actuelle</p>
        <h2>Amsterdam Marathon 2026</h2>
        <p class="you-detail-lead">Objectif principal de la saison.</p>

        <div class="you-progress-line">
          <i style="width:67%"></i>
        </div>

        <div class="you-detail-stats">
          <div><span>Distance objectif</span><strong>42,195 km</strong></div>
          <div><span>Temps objectif</span><strong>2h59'59</strong></div>
          <div><span>Allure cible</span><strong>4'15/km</strong></div>
          <div><span>Progression</span><strong>67 %</strong></div>
        </div>

        <div class="you-note-box">
          <span>Notes personnelles</span>
          <p>Discipline aujourd’hui, liberté demain.</p>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="guard.js"></script>
  <script src="you.js"></script>
</body>
</html>
