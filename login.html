<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momentum Alpha — Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="story-section">
    <div class="section-kicker">Momentum Alpha</div>
    <h2>Connexion</h2>
    <p class="lead">Crée ton compte ou connecte-toi à ton espace Momentum.</p>

    <form id="authForm" class="profile-form">
      <label class="full">
        Email
        <input type="email" name="email" required />
      </label>

      <label class="full">
        Mot de passe
        <input type="password" name="password" required minlength="6" />
      </label>

      <div class="form-actions full">
        <button class="primary" type="button" id="loginBtn">Se connecter</button>
        <button class="secondary" type="button" id="signupBtn">Créer un compte</button>
      </div>

      <p class="hint full" id="authMessage"></p>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
